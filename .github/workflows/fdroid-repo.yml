name: F-Droid repo

# Publishes Vela's own F-Droid repository to GitHub Pages. Users add the repo URL
# (see FDROID.md) to any F-Droid client and get updates like from any other repo.
# Runs on every release event (nightly prereleases and weekly stable promotions
# both fire "published"/"edited") and on manual dispatch.
#
# The repo serves the latest STABLE release plus the newest NIGHTLY when it is
# ahead, so both channels are installable. The index is signed with a dedicated
# repo key (secrets FDROID_KEYSTORE_BASE64 / FDROID_KEYSTORE_PASS); the APKs
# keep the normal Vela app signature.

on:
  # NOT `edited`: marking a release Latest or tweaking its notes is a metadata change that
  # doesn't alter the APK, and it fired a SECOND run alongside `released` on a manual promote -
  # two runs then raced the github-pages environment and invalidated each other's artifact
  # (BlobNotFound, 2026-07-16). `published` (new release) and `released` (prerelease -> full,
  # i.e. the promote itself) cover every case that needs a rebuild.
  release:
    types: [published, released]
  # Releases created by CI's own GITHUB_TOKEN don't fire release events for other
  # workflows (GitHub's anti-recursion rule), so nightly publishes never triggered
  # this on their own - the index went stale until someone dispatched it by hand.
  # workflow_run is the sanctioned workaround: rebuild whenever CI or the weekly
  # promote finishes on main.
  workflow_run:
    workflows: ["CI", "Promote weekly stable"]
    types: [completed]
  # The project website (site/) ships in the SAME Pages artifact as the F-Droid
  # repo and the map fonts - Pages replaces the whole site on every deploy, so a
  # separate website workflow would wipe /repo and /fonts. A site-only push (CI
  # skips those via paths-ignore) therefore redeploys from here.
  push:
    branches: [main]
    paths:
      - 'site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: fdroid-repo
  # true (was false): each run rebuilds the entire index + site from scratch, so only the
  # NEWEST run's output matters. Superseding an overlapping run is lossless and stops two
  # deploys from racing the single github-pages environment (the BlobNotFound failure mode).
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Two gates:
    #  - workflow_run: only rebuild after a SUCCESSFUL main run (a red CI published nothing).
    #  - release: only for an APP release (tag like v0.4.854). The infra/data releases
    #    (asr-models, routing-graphs, map-fonts, tts-models, poi-packs, flock-cameras...) fire
    #    release events too when their assets are updated, and two of them overlapping raced the
    #    single github-pages environment and failed the deploy (2026-07-20). App tags start "v";
    #    data tags don't, so this skips them.
    if: >-
      (github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'))
      && (github.event_name != 'release' || startsWith(github.event.release.tag_name, 'v'))
    steps:
      - uses: actions/checkout@v4

      - name: Install fdroidserver
        # pip, NOT apt: Ubuntu's fdroidserver 2.2.1 ships an androguard too old to parse
        # APKs built by modern AGP ("res1 must be zero!"). Current fdroidserver pulls
        # androguard 4.x, which handles them. apksigner comes from the runner's Android SDK.
        run: |
          pip install --upgrade fdroidserver
          fdroid --version

      - name: Fetch the APKs to serve (latest stable + newest nightly if ahead)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir -p fdroid/repo
          stable_tag=$(gh release view --json tagName -q .tagName --repo "$GITHUB_REPOSITORY")
          echo "stable: $stable_tag"
          # Remember the stable's version for the metadata pin below: the repo SUGGESTS the
          # stable, so default F-Droid users only ever see weekly releases; the newer nightly
          # in the index is treated as unstable and shown only to users who opt into
          # unstable/beta updates for Vela in their client.
          run_no="${stable_tag##*.}"
          echo "STABLE_NAME=${stable_tag#v}" >> "$GITHUB_ENV"
          echo "STABLE_CODE=$((2000 + run_no))" >> "$GITHUB_ENV"
          # Both downloads are best-effort (a release can have no APK asset, e.g. right
          # after the tag is cut); the guard below is what actually fails the job.
          gh release download "$stable_tag" -p '*.apk' -D fdroid/repo --repo "$GITHUB_REPOSITORY" || true
          newest_tag=$(gh release list --limit 1 --json tagName -q '.[0].tagName' --repo "$GITHUB_REPOSITORY")
          echo "newest: $newest_tag"
          if [ "$newest_tag" != "$stable_tag" ]; then
            gh release download "$newest_tag" -p '*.apk' -D fdroid/repo --repo "$GITHUB_REPOSITORY" || true
          fi
          ls -la fdroid/repo
          ls fdroid/repo/*.apk >/dev/null 2>&1 || { echo "no APKs to serve"; exit 1; }

      - name: Write config + keystore
        env:
          FDROID_KEYSTORE_BASE64: ${{ secrets.FDROID_KEYSTORE_BASE64 }}
          FDROID_KEYSTORE_PASS: ${{ secrets.FDROID_KEYSTORE_PASS }}
        run: |
          set -e
          echo "$FDROID_KEYSTORE_BASE64" | base64 -d > fdroid/keystore.p12
          cat > fdroid/config.yml <<EOF
          repo_url: https://pimpinpumpkin.github.io/Vela/repo
          repo_name: Vela Maps
          repo_icon: icon.png
          repo_description: >-
            Official repository for Vela Maps, the degoogled Google Maps
            replacement. Serves the latest stable release and the newest
            nightly build.
          archive_older: 0
          keystore: keystore.p12
          repo_keyalias: fdroidrepo
          keystorepass: $FDROID_KEYSTORE_PASS
          keypass: $FDROID_KEYSTORE_PASS
          EOF
          chmod 0600 fdroid/config.yml
          # Pin the suggested version to the stable (see the fetch step). Appended at build
          # time so the committed metadata never goes stale.
          {
            echo "CurrentVersion: $STABLE_NAME"
            echo "CurrentVersionCode: $STABLE_CODE"
          } >> fdroid/metadata/app.vela.yml

      - name: Build the signed repo index
        run: |
          cd fdroid
          fdroid update --pretty
          # Never ship the key material or the passworded config with the site.
          rm -f keystore.p12 config.yml
          ls -la repo

      - name: Add map font glyphs to the site
        # The basemap's Roboto glyph set (ui/map/MapFonts; built by
        # scripts/build-map-fonts.sh) is served from this same Pages site at
        # /Vela/fonts/. The zip lives on the fixed-tag `map-fonts` release; skip
        # quietly if that release doesn't exist yet so the F-Droid repo still
        # deploys (the app probes the URL and falls back to Noto on a 404).
        run: |
          if curl -sfL -o map-fonts.zip https://github.com/${{ github.repository }}/releases/download/map-fonts/map-fonts.zip; then
            mkdir -p fdroid/fonts
            unzip -q -o map-fonts.zip -d fdroid/fonts
            echo "Fonts added: $(find fdroid/fonts -name '*.pbf' | wc -l) glyph ranges"
          else
            echo "map-fonts release not found; site builds without fonts"
          fi

      - name: Add the website to the site root
        # The landing page (site/index.html + site/assets) serves at
        # https://pimpinpumpkin.github.io/Vela/ alongside /repo and /fonts.
        run: |
          cp site/index.html fdroid/index.html
          cp -r site/assets fdroid/assets
          ls fdroid

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: fdroid

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
